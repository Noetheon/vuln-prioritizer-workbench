name: vuln-prioritizer
description: Run vuln-prioritizer analyze, render reports, package evidence, or validate SARIF.
branding:
  icon: shield
  color: blue

inputs:
  mode:
    description: analyze, compare, explain, doctor, input-validate, input-inspect, input-normalize, snapshot, rollup, data-status, data-update, data-verify, data-export-provider-snapshot, attack-validate, attack-coverage, report-html, workbench-report, report-evidence-bundle, verify-evidence-bundle, or validate-sarif
    required: false
    default: analyze
  input:
    description: Analyze, compare, input-validate, snapshot, and attack-coverage accept one or more newline-delimited input files; report, rollup, explain, and validation modes expect exactly one artifact file such as analysis JSON, evidence ZIP, or SARIF; doctor and attack-validate ignore this value
    required: false
  cve:
    description: Required for explain mode; CVE identifier to explain from the supplied analysis JSON or snapshot JSON
    required: false
    default: ""
  input-format:
    description: analyze mode only; auto, cve-list, generic-occurrence-csv, trivy-json, grype-json, cyclonedx-json, spdx-json, dependency-check-json, github-alerts-json, nessus-xml, openvas-xml. Provide one value or a newline-delimited list aligned with input.
    required: false
    default: auto
  output-format:
    description: analyze mode uses markdown, json, sarif, or table; workbench-report mode uses json, markdown, html, csv, or sarif
    required: false
    default: markdown
  output-path:
    description: Output file path created by the CLI; validate-sarif mode writes a JSON SARIF validation report
    required: true
  html-output-path:
    description: Optional analyze mode sidecar path for a direct HTML report
    required: false
    default: ""
  summary-output-path:
    description: Optional analyze mode sidecar path for a Markdown summary report
    required: false
    default: ""
  summary-template:
    description: analyze mode only; summary rendering style, detailed or compact
    required: false
    default: detailed
  github-step-summary:
    description: Set to true to append the rendered summary output to the GitHub step summary
    required: false
    default: "false"
  validate-sarif:
    description: Set to true to validate SARIF output after analyze/workbench-report when output-format is sarif
    required: false
    default: "false"
  config-file:
    description: Optional runtime config file passed to the CLI
    required: false
    default: ""
  no-config:
    description: Set to true to disable runtime config discovery
    required: false
    default: "false"
  asset-context:
    description: Optional asset context CSV for analyze mode
    required: false
    default: ""
  target-kind:
    description: Optional target kind for analyze mode; generic, image, repository, filesystem, or host
    required: false
    default: generic
  target-ref:
    description: Optional target reference for analyze mode
    required: false
    default: ""
  vex-files:
    description: Optional newline-delimited list of VEX files for analyze mode
    required: false
    default: ""
  fail-on:
    description: Optional fail-on threshold for analyze mode; low, medium, high, or critical
    required: false
    default: ""
  policy-profile:
    description: Optional context policy profile name for analyze mode
    required: false
    default: default
  policy-file:
    description: Optional YAML policy file for analyze mode
    required: false
    default: ""
  waiver-file:
    description: Optional waiver YAML file for analyze mode
    required: false
    default: ""
  defensive-context-file:
    description: Optional local JSON context file for OSV, GHSA, Vulnrichment, or SSVC overlays in analyze, compare, and snapshot modes
    required: false
    default: ""
  show-suppressed:
    description: analyze mode only; set to true to keep VEX-suppressed findings visible
    required: false
    default: "false"
  hide-waived:
    description: analyze mode only; set to true to hide active waived findings
    required: false
    default: "false"
  attack-source:
    description: Optional ATT&CK source for analyze mode; none, local-csv, or ctid-json
    required: false
    default: none
  attack-mapping-file:
    description: Optional ATT&CK mapping file for analyze mode
    required: false
    default: ""
  attack-technique-metadata-file:
    description: Optional ATT&CK technique metadata file for analyze mode
    required: false
    default: ""
  provider-snapshot-file:
    description: Optional provider snapshot JSON for analyze mode fallback or locked replay
    required: false
    default: ""
  locked-provider-data:
    description: analyze mode only; set to true to forbid live provider lookups outside the provider snapshot
    required: false
    default: "false"
  no-cache:
    description: analyze mode only; set to true to disable provider cache reads and writes
    required: false
    default: "false"
  cache-dir:
    description: Optional provider cache directory for analyze mode
    required: false
    default: ""
  cache-ttl-hours:
    description: Optional provider cache TTL in hours for analyze mode
    required: false
    default: ""
  nvd-api-key-env:
    description: Optional environment variable name containing the NVD API key for analyze mode
    required: false
    default: ""
  offline-kev-file:
    description: Optional local CISA KEV JSON file for analyze mode
    required: false
    default: ""
  data-sources:
    description: Optional newline-delimited data sources for data-update or data-export-provider-snapshot; nvd, epss, kev
    required: false
    default: ""
  cache-only:
    description: data-export-provider-snapshot mode only; set to true to export only cache/offline provider records
    required: false
    default: "false"
  offline-attack-file:
    description: Optional legacy local ATT&CK CSV file for analyze mode
    required: false
    default: ""
  priority:
    description: Optional post-enrichment priority filter for analyze mode; low, medium, high, or critical
    required: false
    default: ""
  kev-only:
    description: analyze mode only; set to true to include only CISA KEV findings
    required: false
    default: "false"
  min-cvss:
    description: Optional minimum CVSS filter for analyze mode
    required: false
    default: ""
  min-epss:
    description: Optional minimum EPSS filter for analyze mode
    required: false
    default: ""
  sort-by:
    description: Optional analyze sort key; priority, operational, epss, cvss, or cve
    required: false
    default: ""
  rollup-by:
    description: rollup mode only; aggregate by asset, service, owner, priority, or status
    required: false
    default: asset
  rollup-top:
    description: rollup mode only; maximum rows to include
    required: false
    default: "5"
  max-cves:
    description: Optional maximum number of CVEs to analyze
    required: false
    default: ""
  fail-on-provider-error:
    description: analyze mode only; set to true to fail when provider enrichment has errors
    required: false
    default: "false"
  max-provider-age-hours:
    description: analyze, compare, and snapshot modes; mark provider data stale when replayed snapshots exceed this age
    required: false
    default: ""
  fail-on-stale-provider-data:
    description: analyze, compare, and snapshot modes; set to true to fail when provider data is stale
    required: false
    default: "false"
  fail-on-expired-waivers:
    description: analyze mode only; set to true to fail when expired waivers are present
    required: false
    default: "false"
  fail-on-review-due-waivers:
    description: analyze mode only; set to true to fail when waiver reviews are due
    required: false
    default: "false"
  python-version:
    description: Python version used to install and run the CLI
    required: false
    default: "3.11"

outputs:
  report-path:
    description: Output file path written by the action
    value: ${{ steps.run-cli.outputs.report-path }}
  html-report-path:
    description: HTML output path written by analyze mode when html-output-path is set or by report-html mode at output-path
    value: ${{ steps.run-cli.outputs.html-report-path }}
  summary-path:
    description: Markdown summary path written by analyze mode when summary-output-path is set or github-step-summary generates a temporary summary
    value: ${{ steps.run-cli.outputs.summary-path }}
  sarif-validation-path:
    description: JSON SARIF validation report path written by validate-sarif mode or when validate-sarif is true
    value: ${{ steps.run-cli.outputs.sarif-validation-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install vuln-prioritizer from action checkout
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Run vuln-prioritizer
      id: run-cli
      shell: bash
      run: |
        set -euo pipefail

        mode="${{ inputs.mode }}"
        html_report_path=""
        summary_path=""
        sarif_validation_path=""
        sarif_report_path=""
        summary_requested="false"
        requested_summary_path="${{ inputs.summary-output-path }}"
        summary_template="${{ inputs.summary-template }}"
        cmd=(vuln-prioritizer)

        if [[ "$summary_template" != "detailed" && "$summary_template" != "compact" ]]; then
          echo "Unsupported summary-template: $summary_template" >&2
          exit 2
        fi

        count_nonempty_lines() {
          local raw="$1"
          local count=0
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              count=$((count + 1))
            fi
          done <<< "$raw"
          printf '%s' "$count"
        }

        append_multiline_args() {
          local flag="$1"
          local raw="$2"
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              cmd+=("$flag" "$value")
            fi
          done <<< "$raw"
        }

        resolve_single_input() {
          local raw="$1"
          local input_count=0
          local resolved=""
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              input_count=$((input_count + 1))
              resolved="$value"
            fi
          done <<< "$raw"
          if [[ "$input_count" -ne 1 ]]; then
            echo "$mode mode expects exactly one input path." >&2
            exit 2
          fi
          printf '%s' "$resolved"
        }

        if [[ -n "${{ inputs.config-file }}" ]]; then
          cmd+=(--config "${{ inputs.config-file }}")
        fi
        if [[ "${{ inputs.no-config }}" == "true" ]]; then
          cmd+=(--no-config)
        fi

        if [[ "$mode" == "analyze" ]]; then
          if [[ "$(count_nonempty_lines "${{ inputs.input }}")" -eq 0 ]]; then
            echo "analyze mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            analyze
            --format "${{ inputs.output-format }}"
            --output "${{ inputs.output-path }}"
            --policy-profile "${{ inputs.policy-profile }}"
            --attack-source "${{ inputs.attack-source }}"
            --target-kind "${{ inputs.target-kind }}"
          )
          if [[ "${{ inputs.output-format }}" == "sarif" ]]; then
            sarif_report_path="${{ inputs.output-path }}"
          fi
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"

          if [[ -n "$requested_summary_path" || "${{ inputs.github-step-summary }}" == "true" ]]; then
            summary_requested="true"
            if [[ -z "$requested_summary_path" ]]; then
              requested_summary_path="$RUNNER_TEMP/vuln-prioritizer-summary.md"
            fi
            cmd+=(--summary-output "$requested_summary_path")
            cmd+=(--summary-template "$summary_template")
          fi

          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.html-output-path }}" ]]; then
            cmd+=(--html-output "${{ inputs.html-output-path }}")
            html_report_path="${{ inputs.html-output-path }}"
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.policy-file }}" ]]; then
            cmd+=(--policy-file "${{ inputs.policy-file }}")
          fi
          if [[ -n "${{ inputs.waiver-file }}" ]]; then
            cmd+=(--waiver-file "${{ inputs.waiver-file }}")
          fi
          if [[ -n "${{ inputs.defensive-context-file }}" ]]; then
            cmd+=(--defensive-context-file "${{ inputs.defensive-context-file }}")
          fi
          if [[ -n "${{ inputs.fail-on }}" ]]; then
            cmd+=(--fail-on "${{ inputs.fail-on }}")
          fi
          if [[ "${{ inputs.show-suppressed }}" == "true" ]]; then
            cmd+=(--show-suppressed)
          fi
          if [[ "${{ inputs.hide-waived }}" == "true" ]]; then
            cmd+=(--hide-waived)
          fi
          if [[ -n "${{ inputs.priority }}" ]]; then
            cmd+=(--priority "${{ inputs.priority }}")
          fi
          if [[ "${{ inputs.kev-only }}" == "true" ]]; then
            cmd+=(--kev-only)
          fi
          if [[ -n "${{ inputs.min-cvss }}" ]]; then
            cmd+=(--min-cvss "${{ inputs.min-cvss }}")
          fi
          if [[ -n "${{ inputs.min-epss }}" ]]; then
            cmd+=(--min-epss "${{ inputs.min-epss }}")
          fi
          if [[ -n "${{ inputs.sort-by }}" ]]; then
            cmd+=(--sort-by "${{ inputs.sort-by }}")
          fi
          if [[ -n "${{ inputs.max-cves }}" ]]; then
            cmd+=(--max-cves "${{ inputs.max-cves }}")
          fi
          if [[ "${{ inputs.fail-on-provider-error }}" == "true" ]]; then
            cmd+=(--fail-on-provider-error)
          fi
          if [[ -n "${{ inputs.max-provider-age-hours }}" ]]; then
            cmd+=(--max-provider-age-hours "${{ inputs.max-provider-age-hours }}")
          fi
          if [[ "${{ inputs.fail-on-stale-provider-data }}" == "true" ]]; then
            cmd+=(--fail-on-stale-provider-data)
          fi
          if [[ "${{ inputs.fail-on-expired-waivers }}" == "true" ]]; then
            cmd+=(--fail-on-expired-waivers)
          fi
          if [[ "${{ inputs.fail-on-review-due-waivers }}" == "true" ]]; then
            cmd+=(--fail-on-review-due-waivers)
          fi
          if [[ -n "${{ inputs.attack-mapping-file }}" ]]; then
            cmd+=(--attack-mapping-file "${{ inputs.attack-mapping-file }}")
          fi
          if [[ -n "${{ inputs.attack-technique-metadata-file }}" ]]; then
            cmd+=(--attack-technique-metadata-file "${{ inputs.attack-technique-metadata-file }}")
          fi
          if [[ -n "${{ inputs.provider-snapshot-file }}" ]]; then
            cmd+=(--provider-snapshot-file "${{ inputs.provider-snapshot-file }}")
          fi
          if [[ "${{ inputs.locked-provider-data }}" == "true" ]]; then
            cmd+=(--locked-provider-data)
          fi
          if [[ "${{ inputs.no-cache }}" == "true" ]]; then
            cmd+=(--no-cache)
          fi
          if [[ -n "${{ inputs.cache-dir }}" ]]; then
            cmd+=(--cache-dir "${{ inputs.cache-dir }}")
          fi
          if [[ -n "${{ inputs.cache-ttl-hours }}" ]]; then
            cmd+=(--cache-ttl-hours "${{ inputs.cache-ttl-hours }}")
          fi
          if [[ -n "${{ inputs.nvd-api-key-env }}" ]]; then
            cmd+=(--nvd-api-key-env "${{ inputs.nvd-api-key-env }}")
          fi
          if [[ -n "${{ inputs.offline-kev-file }}" ]]; then
            cmd+=(--offline-kev-file "${{ inputs.offline-kev-file }}")
          fi
          if [[ -n "${{ inputs.offline-attack-file }}" ]]; then
            cmd+=(--offline-attack-file "${{ inputs.offline-attack-file }}")
          fi
          if [[ -n "${{ inputs.vex-files }}" ]]; then
            append_multiline_args "--vex-file" "${{ inputs.vex-files }}"
          fi
        elif [[ "$mode" == "compare" ]]; then
          if [[ "$(count_nonempty_lines "${{ inputs.input }}")" -eq 0 ]]; then
            echo "compare mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            compare
            --format "${{ inputs.output-format }}"
            --output "${{ inputs.output-path }}"
            --policy-profile "${{ inputs.policy-profile }}"
            --attack-source "${{ inputs.attack-source }}"
            --target-kind "${{ inputs.target-kind }}"
          )
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"
          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.policy-file }}" ]]; then
            cmd+=(--policy-file "${{ inputs.policy-file }}")
          fi
          if [[ -n "${{ inputs.waiver-file }}" ]]; then
            cmd+=(--waiver-file "${{ inputs.waiver-file }}")
          fi
          if [[ -n "${{ inputs.defensive-context-file }}" ]]; then
            cmd+=(--defensive-context-file "${{ inputs.defensive-context-file }}")
          fi
          if [[ "${{ inputs.show-suppressed }}" == "true" ]]; then
            cmd+=(--show-suppressed)
          fi
          if [[ "${{ inputs.hide-waived }}" == "true" ]]; then
            cmd+=(--hide-waived)
          fi
          if [[ -n "${{ inputs.priority }}" ]]; then
            cmd+=(--priority "${{ inputs.priority }}")
          fi
          if [[ "${{ inputs.kev-only }}" == "true" ]]; then
            cmd+=(--kev-only)
          fi
          if [[ -n "${{ inputs.min-cvss }}" ]]; then
            cmd+=(--min-cvss "${{ inputs.min-cvss }}")
          fi
          if [[ -n "${{ inputs.min-epss }}" ]]; then
            cmd+=(--min-epss "${{ inputs.min-epss }}")
          fi
          if [[ -n "${{ inputs.sort-by }}" ]]; then
            cmd+=(--sort-by "${{ inputs.sort-by }}")
          fi
          if [[ -n "${{ inputs.max-cves }}" ]]; then
            cmd+=(--max-cves "${{ inputs.max-cves }}")
          fi
          if [[ "${{ inputs.fail-on-provider-error }}" == "true" ]]; then
            cmd+=(--fail-on-provider-error)
          fi
          if [[ -n "${{ inputs.max-provider-age-hours }}" ]]; then
            cmd+=(--max-provider-age-hours "${{ inputs.max-provider-age-hours }}")
          fi
          if [[ "${{ inputs.fail-on-stale-provider-data }}" == "true" ]]; then
            cmd+=(--fail-on-stale-provider-data)
          fi
          if [[ -n "${{ inputs.attack-mapping-file }}" ]]; then
            cmd+=(--attack-mapping-file "${{ inputs.attack-mapping-file }}")
          fi
          if [[ -n "${{ inputs.attack-technique-metadata-file }}" ]]; then
            cmd+=(--attack-technique-metadata-file "${{ inputs.attack-technique-metadata-file }}")
          fi
          if [[ -n "${{ inputs.provider-snapshot-file }}" ]]; then
            cmd+=(--provider-snapshot-file "${{ inputs.provider-snapshot-file }}")
          fi
          if [[ "${{ inputs.locked-provider-data }}" == "true" ]]; then
            cmd+=(--locked-provider-data)
          fi
          if [[ "${{ inputs.no-cache }}" == "true" ]]; then
            cmd+=(--no-cache)
          fi
          if [[ -n "${{ inputs.cache-dir }}" ]]; then
            cmd+=(--cache-dir "${{ inputs.cache-dir }}")
          fi
          if [[ -n "${{ inputs.cache-ttl-hours }}" ]]; then
            cmd+=(--cache-ttl-hours "${{ inputs.cache-ttl-hours }}")
          fi
          if [[ -n "${{ inputs.nvd-api-key-env }}" ]]; then
            cmd+=(--nvd-api-key-env "${{ inputs.nvd-api-key-env }}")
          fi
          if [[ -n "${{ inputs.offline-kev-file }}" ]]; then
            cmd+=(--offline-kev-file "${{ inputs.offline-kev-file }}")
          fi
          if [[ -n "${{ inputs.offline-attack-file }}" ]]; then
            cmd+=(--offline-attack-file "${{ inputs.offline-attack-file }}")
          fi
          if [[ -n "${{ inputs.vex-files }}" ]]; then
            append_multiline_args "--vex-file" "${{ inputs.vex-files }}"
          fi
        elif [[ "$mode" == "explain" ]]; then
          if [[ -z "${{ inputs.cve }}" ]]; then
            echo "explain mode requires the cve input." >&2
            exit 2
          fi
          explain_input="$(resolve_single_input "${{ inputs.input }}")"
          cmd+=(
            explain
            --cve "${{ inputs.cve }}"
            --analysis-json "$explain_input"
            --output "${{ inputs.output-path }}"
            --format "${{ inputs.output-format }}"
          )
        elif [[ "$mode" == "doctor" ]]; then
          doctor_format="${{ inputs.output-format }}"
          if [[ "$doctor_format" != "json" ]]; then
            doctor_format="json"
          fi
          cmd+=(
            doctor
            --output "${{ inputs.output-path }}"
            --format "$doctor_format"
          )
          if [[ -n "${{ inputs.cache-dir }}" ]]; then
            cmd+=(--cache-dir "${{ inputs.cache-dir }}")
          fi
          if [[ -n "${{ inputs.cache-ttl-hours }}" ]]; then
            cmd+=(--cache-ttl-hours "${{ inputs.cache-ttl-hours }}")
          fi
          if [[ -n "${{ inputs.nvd-api-key-env }}" ]]; then
            cmd+=(--nvd-api-key-env "${{ inputs.nvd-api-key-env }}")
          fi
          if [[ -n "${{ inputs.offline-kev-file }}" ]]; then
            cmd+=(--offline-kev-file "${{ inputs.offline-kev-file }}")
          fi
          if [[ -n "${{ inputs.waiver-file }}" ]]; then
            cmd+=(--waiver-file "${{ inputs.waiver-file }}")
          fi
          if [[ -n "${{ inputs.attack-mapping-file }}" ]]; then
            cmd+=(--attack-mapping-file "${{ inputs.attack-mapping-file }}")
          fi
          if [[ -n "${{ inputs.attack-technique-metadata-file }}" ]]; then
            cmd+=(--attack-technique-metadata-file "${{ inputs.attack-technique-metadata-file }}")
          fi
        elif [[ "$mode" == "input-validate" ]]; then
          input_validate_format="${{ inputs.output-format }}"
          if [[ "$input_validate_format" != "json" ]]; then
            input_validate_format="json"
          fi
          cmd+=(
            input validate
            --output "${{ inputs.output-path }}"
            --format "$input_validate_format"
            --target-kind "${{ inputs.target-kind }}"
          )
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"
          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.max-cves }}" ]]; then
            cmd+=(--max-cves "${{ inputs.max-cves }}")
          fi
          if [[ -n "${{ inputs.vex-files }}" ]]; then
            append_multiline_args "--vex-file" "${{ inputs.vex-files }}"
          fi
        elif [[ "$mode" == "input-inspect" || "$mode" == "input-normalize" ]]; then
          input_command="inspect"
          if [[ "$mode" == "input-normalize" ]]; then
            input_command="normalize"
          fi
          input_output_format="${{ inputs.output-format }}"
          if [[ "$input_output_format" != "json" ]]; then
            input_output_format="json"
          fi
          cmd+=(
            input "$input_command"
            --output "${{ inputs.output-path }}"
            --format "$input_output_format"
            --target-kind "${{ inputs.target-kind }}"
          )
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"
          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.max-cves }}" ]]; then
            cmd+=(--max-cves "${{ inputs.max-cves }}")
          fi
          if [[ -n "${{ inputs.vex-files }}" ]]; then
            append_multiline_args "--vex-file" "${{ inputs.vex-files }}"
          fi
        elif [[ "$mode" == "snapshot" ]]; then
          if [[ "$(count_nonempty_lines "${{ inputs.input }}")" -eq 0 ]]; then
            echo "snapshot mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            snapshot create
            --format "${{ inputs.output-format }}"
            --output "${{ inputs.output-path }}"
            --policy-profile "${{ inputs.policy-profile }}"
            --attack-source "${{ inputs.attack-source }}"
            --target-kind "${{ inputs.target-kind }}"
          )
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"
          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.policy-file }}" ]]; then
            cmd+=(--policy-file "${{ inputs.policy-file }}")
          fi
          if [[ -n "${{ inputs.waiver-file }}" ]]; then
            cmd+=(--waiver-file "${{ inputs.waiver-file }}")
          fi
          if [[ -n "${{ inputs.defensive-context-file }}" ]]; then
