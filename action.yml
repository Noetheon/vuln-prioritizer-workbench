name: vuln-prioritizer
description: Run vuln-prioritizer analyze or render a static HTML report from analysis JSON.
branding:
  icon: shield
  color: blue

inputs:
  mode:
    description: analyze or report-html
    required: false
    default: analyze
  input:
    description: Analyze mode accepts one or more newline-delimited input files; report-html expects one analysis JSON file
    required: true
  input-format:
    description: analyze mode only; auto, cve-list, trivy-json, grype-json, cyclonedx-json, spdx-json, dependency-check-json, github-alerts-json, nessus-xml, openvas-xml. Provide one value or a newline-delimited list aligned with input.
    required: false
    default: auto
  output-format:
    description: analyze mode only; markdown, json, or sarif
    required: false
    default: markdown
  output-path:
    description: Output file path created by the CLI
    required: true
  html-output-path:
    description: Optional analyze mode sidecar path for a direct HTML report
    required: false
    default: ""
  summary-output-path:
    description: Optional analyze mode sidecar path for a Markdown summary report
    required: false
    default: ""
  summary-template:
    description: analyze mode only; summary rendering style, detailed or compact
    required: false
    default: detailed
  github-step-summary:
    description: Set to true to append the rendered summary output to the GitHub step summary
    required: false
    default: "false"
  config-file:
    description: Optional runtime config file passed to the CLI
    required: false
    default: ""
  no-config:
    description: Set to true to disable runtime config discovery
    required: false
    default: "false"
  asset-context:
    description: Optional asset context CSV for analyze mode
    required: false
    default: ""
  target-kind:
    description: Optional target kind for analyze mode; generic, image, repository, filesystem, or host
    required: false
    default: generic
  target-ref:
    description: Optional target reference for analyze mode
    required: false
    default: ""
  vex-files:
    description: Optional newline-delimited list of VEX files for analyze mode
    required: false
    default: ""
  fail-on:
    description: Optional fail-on threshold for analyze mode; low, medium, high, or critical
    required: false
    default: ""
  policy-profile:
    description: Optional context policy profile name for analyze mode
    required: false
    default: default
  policy-file:
    description: Optional YAML policy file for analyze mode
    required: false
    default: ""
  show-suppressed:
    description: analyze mode only; set to true to keep VEX-suppressed findings visible
    required: false
    default: "false"
  attack-source:
    description: Optional ATT&CK source for analyze mode; none, local-csv, or ctid-json
    required: false
    default: none
  attack-mapping-file:
    description: Optional ATT&CK mapping file for analyze mode
    required: false
    default: ""
  attack-technique-metadata-file:
    description: Optional ATT&CK technique metadata file for analyze mode
    required: false
    default: ""
  provider-snapshot-file:
    description: Optional provider snapshot JSON for analyze mode fallback or locked replay
    required: false
    default: ""
  locked-provider-data:
    description: analyze mode only; set to true to forbid live provider lookups outside the provider snapshot
    required: false
    default: "false"
  python-version:
    description: Python version used to install and run the CLI
    required: false
    default: "3.11"

outputs:
  report-path:
    description: Output file path written by the action
    value: ${{ steps.run-cli.outputs.report-path }}
  html-report-path:
    description: HTML output path written by analyze mode when html-output-path is set or by report-html mode at output-path
    value: ${{ steps.run-cli.outputs.html-report-path }}
  summary-path:
    description: Markdown summary path written by analyze mode when summary-output-path is set or github-step-summary generates a temporary summary
    value: ${{ steps.run-cli.outputs.summary-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install vuln-prioritizer from action checkout
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Run vuln-prioritizer
      id: run-cli
      shell: bash
      run: |
        set -euo pipefail

        mode="${{ inputs.mode }}"
        html_report_path=""
        summary_path=""
        summary_requested="false"
        requested_summary_path="${{ inputs.summary-output-path }}"
        summary_template="${{ inputs.summary-template }}"
        cli_summary_path=""
        cmd=(vuln-prioritizer)

        if [[ "$summary_template" != "detailed" && "$summary_template" != "compact" ]]; then
          echo "Unsupported summary-template: $summary_template" >&2
          exit 2
        fi

        count_nonempty_lines() {
          local raw="$1"
          local count=0
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              count=$((count + 1))
            fi
          done <<< "$raw"
          printf '%s' "$count"
        }

        append_multiline_args() {
          local flag="$1"
          local raw="$2"
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              cmd+=("$flag" "$value")
            fi
          done <<< "$raw"
        }

        resolve_single_input() {
          local raw="$1"
          local input_count=0
          local resolved=""
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              input_count=$((input_count + 1))
              resolved="$value"
            fi
          done <<< "$raw"
          if [[ "$input_count" -ne 1 ]]; then
            echo "report-html mode expects exactly one input path." >&2
            exit 2
          fi
          printf '%s' "$resolved"
        }

        render_compact_summary() {
          python - "$1" "$2" <<'PY'
        from __future__ import annotations

        import sys
        from pathlib import Path


        source = Path(sys.argv[1])
        destination = Path(sys.argv[2])
        lines = source.read_text(encoding="utf-8").splitlines()

        summary_fields: dict[str, str] = {}
        top_findings: list[str] = []
        in_top_findings = False

        for line in lines:
            if line.startswith("## "):
                in_top_findings = line.strip() == "## Top Findings"
                continue
            if line.startswith("- "):
                body = line[2:]
                if in_top_findings:
                    top_findings.append(body.split(": ", 1)[0])
                elif ": " in body:
                    key, value = body.split(": ", 1)
                    summary_fields[key] = value

        metrics = [
            ("Findings shown", summary_fields.get("Findings shown", "N/A")),
            ("Critical", summary_fields.get("Critical", "N/A")),
            ("High", summary_fields.get("High", "N/A")),
            ("KEV hits", summary_fields.get("KEV hits", "N/A")),
            ("ATT&CK mapped", summary_fields.get("ATT&CK mapped CVEs", "N/A")),
            ("Review due", summary_fields.get("Waiver review due", "N/A")),
            ("Expired waivers", summary_fields.get("Expired waivers", "N/A")),
        ]

        header = [
            "# Vulnerability Prioritization Summary",
            "",
            f"- Input: {summary_fields.get('Input', '`N/A`')}",
            f"- Input format: {summary_fields.get('Input format', '`N/A`')}",
            f"- Policy profile: {summary_fields.get('Policy profile', '`N/A`')}",
            "",
            "| Findings shown | Critical | High | KEV hits | ATT&CK mapped | Review due | Expired waivers |",
            "| --- | --- | --- | --- | --- | --- | --- |",
            "| " + " | ".join(value for _, value in metrics) + " |",
        ]

        if top_findings:
            header.extend(["", "## Top Findings"])
            header.extend(f"- {finding}" for finding in top_findings[:3])

        destination.write_text("\n".join(header) + "\n", encoding="utf-8")
        PY
        }

        if [[ -n "${{ inputs.config-file }}" ]]; then
          cmd+=(--config "${{ inputs.config-file }}")
        fi
        if [[ "${{ inputs.no-config }}" == "true" ]]; then
          cmd+=(--no-config)
        fi

        if [[ "$mode" == "analyze" ]]; then
          if [[ "$(count_nonempty_lines "${{ inputs.input }}")" -eq 0 ]]; then
            echo "analyze mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            analyze
            --format "${{ inputs.output-format }}"
            --output "${{ inputs.output-path }}"
            --policy-profile "${{ inputs.policy-profile }}"
            --attack-source "${{ inputs.attack-source }}"
            --target-kind "${{ inputs.target-kind }}"
          )
          append_multiline_args "--input" "${{ inputs.input }}"
          append_multiline_args "--input-format" "${{ inputs.input-format }}"

          if [[ -n "$requested_summary_path" || "${{ inputs.github-step-summary }}" == "true" ]]; then
            summary_requested="true"
            if [[ -z "$requested_summary_path" ]]; then
              requested_summary_path="$RUNNER_TEMP/vuln-prioritizer-summary.md"
            fi
            if [[ "$summary_template" == "compact" ]]; then
              cli_summary_path="$RUNNER_TEMP/vuln-prioritizer-summary-detailed.md"
            else
              cli_summary_path="$requested_summary_path"
            fi
            cmd+=(--summary-output "$cli_summary_path")
          fi

          if [[ -n "${{ inputs.asset-context }}" ]]; then
            cmd+=(--asset-context "${{ inputs.asset-context }}")
          fi
          if [[ -n "${{ inputs.html-output-path }}" ]]; then
            cmd+=(--html-output "${{ inputs.html-output-path }}")
            html_report_path="${{ inputs.html-output-path }}"
          fi
          if [[ -n "${{ inputs.target-ref }}" ]]; then
            cmd+=(--target-ref "${{ inputs.target-ref }}")
          fi
          if [[ -n "${{ inputs.policy-file }}" ]]; then
            cmd+=(--policy-file "${{ inputs.policy-file }}")
          fi
          if [[ -n "${{ inputs.fail-on }}" ]]; then
            cmd+=(--fail-on "${{ inputs.fail-on }}")
          fi
          if [[ "${{ inputs.show-suppressed }}" == "true" ]]; then
            cmd+=(--show-suppressed)
          fi
          if [[ -n "${{ inputs.attack-mapping-file }}" ]]; then
            cmd+=(--attack-mapping-file "${{ inputs.attack-mapping-file }}")
          fi
          if [[ -n "${{ inputs.attack-technique-metadata-file }}" ]]; then
            cmd+=(--attack-technique-metadata-file "${{ inputs.attack-technique-metadata-file }}")
          fi
          if [[ -n "${{ inputs.provider-snapshot-file }}" ]]; then
            cmd+=(--provider-snapshot-file "${{ inputs.provider-snapshot-file }}")
          fi
          if [[ "${{ inputs.locked-provider-data }}" == "true" ]]; then
            cmd+=(--locked-provider-data)
          fi
          if [[ -n "${{ inputs.vex-files }}" ]]; then
            append_multiline_args "--vex-file" "${{ inputs.vex-files }}"
          fi
        elif [[ "$mode" == "report-html" ]]; then
          report_input="$(resolve_single_input "${{ inputs.input }}")"
          cmd+=(
            report html
            --input "$report_input"
            --output "${{ inputs.output-path }}"
          )
          html_report_path="${{ inputs.output-path }}"
        else
          echo "Unsupported mode: $mode" >&2
          exit 2
        fi

        printf 'Running command:'
        printf ' %q' "${cmd[@]}"
        printf '\n'
        "${cmd[@]}"
        if [[ "$summary_requested" == "true" ]]; then
          if [[ "$summary_template" == "compact" ]]; then
            render_compact_summary "$cli_summary_path" "$requested_summary_path"
          fi
          summary_path="$requested_summary_path"
        fi
        echo "report-path=${{ inputs.output-path }}" >> "$GITHUB_OUTPUT"
        echo "html-report-path=$html_report_path" >> "$GITHUB_OUTPUT"
        echo "summary-path=$summary_path" >> "$GITHUB_OUTPUT"
        if [[ "${{ inputs.github-step-summary }}" == "true" && -n "$summary_path" && -f "$summary_path" ]]; then
          cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
        fi
