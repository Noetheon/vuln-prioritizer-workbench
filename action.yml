name: vuln-prioritizer
description: Run vuln-prioritizer analyze, render reports, package evidence, or validate SARIF.
branding:
  icon: shield
  color: blue

inputs:
  mode:
    description: analyze, compare, explain, doctor, input-validate, input-inspect, input-normalize, snapshot, rollup, data-status, data-update, data-verify, data-export-provider-snapshot, attack-validate, attack-coverage, report-html, workbench-report, report-evidence-bundle, verify-evidence-bundle, or validate-sarif
    required: false
    default: analyze
  input:
    description: Analyze, compare, input-validate, snapshot, and attack-coverage accept one or more newline-delimited input files; report, rollup, explain, and validation modes expect exactly one artifact file such as analysis JSON, evidence ZIP, or SARIF; doctor and attack-validate ignore this value
    required: false
  cve:
    description: Required for explain mode; CVE identifier to explain from the supplied analysis JSON or snapshot JSON
    required: false
    default: ""
  input-format:
    description: analyze mode only; auto, cve-list, generic-occurrence-csv, trivy-json, grype-json, cyclonedx-json, spdx-json, dependency-check-json, github-alerts-json, nessus-xml, openvas-xml. Provide one value or a newline-delimited list aligned with input.
    required: false
    default: auto
  output-format:
    description: analyze mode uses markdown, json, sarif, or table; workbench-report mode uses json, markdown, html, csv, or sarif
    required: false
    default: markdown
  output-path:
    description: Output file path created by the CLI; validate-sarif mode writes a JSON SARIF validation report
    required: true
  html-output-path:
    description: Optional analyze mode sidecar path for a direct HTML report
    required: false
    default: ""
  summary-output-path:
    description: Optional analyze mode sidecar path for a Markdown summary report
    required: false
    default: ""
  summary-template:
    description: analyze mode only; summary rendering style, detailed or compact
    required: false
    default: detailed
  github-step-summary:
    description: Set to true to append the rendered summary output to the GitHub step summary
    required: false
    default: "false"
  validate-sarif:
    description: Set to true to validate SARIF output after analyze/workbench-report when output-format is sarif
    required: false
    default: "false"
  config-file:
    description: Optional runtime config file passed to the CLI
    required: false
    default: ""
  no-config:
    description: Set to true to disable runtime config discovery
    required: false
    default: "false"
  asset-context:
    description: Optional asset context CSV for analyze mode
    required: false
    default: ""
  target-kind:
    description: Optional target kind for analyze mode; generic, image, repository, filesystem, or host
    required: false
    default: generic
  target-ref:
    description: Optional target reference for analyze mode
    required: false
    default: ""
  vex-files:
    description: Optional newline-delimited list of VEX files for analyze mode
    required: false
    default: ""
  fail-on:
    description: Optional fail-on threshold for analyze mode; low, medium, high, or critical
    required: false
    default: ""
  policy-profile:
    description: Optional context policy profile name for analyze mode
    required: false
    default: default
  policy-file:
    description: Optional YAML policy file for analyze mode
    required: false
    default: ""
  waiver-file:
    description: Optional waiver YAML file for analyze mode
    required: false
    default: ""
  defensive-context-file:
    description: Optional local JSON context file for OSV, GHSA, Vulnrichment, or SSVC overlays in analyze, compare, and snapshot modes
    required: false
    default: ""
  show-suppressed:
    description: analyze mode only; set to true to keep VEX-suppressed findings visible
    required: false
    default: "false"
  hide-waived:
    description: analyze mode only; set to true to hide active waived findings
    required: false
    default: "false"
  attack-source:
    description: Optional ATT&CK source for analyze mode; none, local-csv, or ctid-json
    required: false
    default: none
  attack-mapping-file:
    description: Optional ATT&CK mapping file for analyze mode
    required: false
    default: ""
  attack-technique-metadata-file:
    description: Optional ATT&CK technique metadata file for analyze mode
    required: false
    default: ""
  provider-snapshot-file:
    description: Optional provider snapshot JSON for analyze mode fallback or locked replay
    required: false
    default: ""
  locked-provider-data:
    description: analyze mode only; set to true to forbid live provider lookups outside the provider snapshot
    required: false
    default: "false"
  no-cache:
    description: analyze mode only; set to true to disable provider cache reads and writes
    required: false
    default: "false"
  cache-dir:
    description: Optional provider cache directory for analyze mode
    required: false
    default: ""
  cache-ttl-hours:
    description: Optional provider cache TTL in hours for analyze mode
    required: false
    default: ""
  nvd-api-key-env:
    description: Optional environment variable name containing the NVD API key for analyze mode
    required: false
    default: ""
  offline-kev-file:
    description: Optional local CISA KEV JSON file for analyze mode
    required: false
    default: ""
  data-sources:
    description: Optional newline-delimited data sources for data-update or data-export-provider-snapshot; nvd, epss, kev
    required: false
    default: ""
  cache-only:
    description: data-export-provider-snapshot mode only; set to true to export only cache/offline provider records
    required: false
    default: "false"
  offline-attack-file:
    description: Optional legacy local ATT&CK CSV file for analyze mode
    required: false
    default: ""
  priority:
    description: Optional post-enrichment priority filter for analyze mode; low, medium, high, or critical
    required: false
    default: ""
  kev-only:
    description: analyze mode only; set to true to include only CISA KEV findings
    required: false
    default: "false"
  min-cvss:
    description: Optional minimum CVSS filter for analyze mode
    required: false
    default: ""
  min-epss:
    description: Optional minimum EPSS filter for analyze mode
    required: false
    default: ""
  sort-by:
    description: Optional analyze sort key; priority, operational, epss, cvss, or cve
    required: false
    default: ""
  rollup-by:
    description: rollup mode only; aggregate by asset, service, owner, priority, or status
    required: false
    default: asset
  rollup-top:
    description: rollup mode only; maximum rows to include
    required: false
    default: "5"
  max-cves:
    description: Optional maximum number of CVEs to analyze
    required: false
    default: ""
  fail-on-provider-error:
    description: analyze mode only; set to true to fail when provider enrichment has errors
    required: false
    default: "false"
  max-provider-age-hours:
    description: analyze, compare, and snapshot modes; mark provider data stale when replayed snapshots exceed this age
    required: false
    default: ""
  fail-on-stale-provider-data:
    description: analyze, compare, and snapshot modes; set to true to fail when provider data is stale
    required: false
    default: "false"
  fail-on-expired-waivers:
    description: analyze mode only; set to true to fail when expired waivers are present
    required: false
    default: "false"
  fail-on-review-due-waivers:
    description: analyze mode only; set to true to fail when waiver reviews are due
    required: false
    default: "false"
  python-version:
    description: Python version used to install and run the CLI
    required: false
    default: "3.11"

outputs:
  report-path:
    description: Output file path written by the action
    value: ${{ steps.run-cli.outputs.report-path }}
  html-report-path:
    description: HTML output path written by analyze mode when html-output-path is set or by report-html mode at output-path
    value: ${{ steps.run-cli.outputs.html-report-path }}
  summary-path:
    description: Markdown summary path written by analyze mode when summary-output-path is set or github-step-summary generates a temporary summary
    value: ${{ steps.run-cli.outputs.summary-path }}
  sarif-validation-path:
    description: JSON SARIF validation report path written by validate-sarif mode or when validate-sarif is true
    value: ${{ steps.run-cli.outputs.sarif-validation-path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install vuln-prioritizer from action checkout
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Run vuln-prioritizer
      id: run-cli
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_INPUT: ${{ inputs.input }}
        INPUT_CVE: ${{ inputs.cve }}
        INPUT_INPUT_FORMAT: ${{ inputs.input-format }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_HTML_OUTPUT_PATH: ${{ inputs.html-output-path }}
        INPUT_SUMMARY_OUTPUT_PATH: ${{ inputs.summary-output-path }}
        INPUT_SUMMARY_TEMPLATE: ${{ inputs.summary-template }}
        INPUT_GITHUB_STEP_SUMMARY: ${{ inputs.github-step-summary }}
        INPUT_VALIDATE_SARIF: ${{ inputs.validate-sarif }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_NO_CONFIG: ${{ inputs.no-config }}
        INPUT_ASSET_CONTEXT: ${{ inputs.asset-context }}
        INPUT_TARGET_KIND: ${{ inputs.target-kind }}
        INPUT_TARGET_REF: ${{ inputs.target-ref }}
        INPUT_VEX_FILES: ${{ inputs.vex-files }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_POLICY_PROFILE: ${{ inputs.policy-profile }}
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
        INPUT_WAIVER_FILE: ${{ inputs.waiver-file }}
        INPUT_DEFENSIVE_CONTEXT_FILE: ${{ inputs.defensive-context-file }}
        INPUT_SHOW_SUPPRESSED: ${{ inputs.show-suppressed }}
        INPUT_HIDE_WAIVED: ${{ inputs.hide-waived }}
        INPUT_ATTACK_SOURCE: ${{ inputs.attack-source }}
        INPUT_ATTACK_MAPPING_FILE: ${{ inputs.attack-mapping-file }}
        INPUT_ATTACK_TECHNIQUE_METADATA_FILE: ${{ inputs.attack-technique-metadata-file }}
        INPUT_PROVIDER_SNAPSHOT_FILE: ${{ inputs.provider-snapshot-file }}
        INPUT_LOCKED_PROVIDER_DATA: ${{ inputs.locked-provider-data }}
        INPUT_NO_CACHE: ${{ inputs.no-cache }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_CACHE_TTL_HOURS: ${{ inputs.cache-ttl-hours }}
        INPUT_NVD_API_KEY_ENV: ${{ inputs.nvd-api-key-env }}
        INPUT_OFFLINE_KEV_FILE: ${{ inputs.offline-kev-file }}
        INPUT_DATA_SOURCES: ${{ inputs.data-sources }}
        INPUT_CACHE_ONLY: ${{ inputs.cache-only }}
        INPUT_OFFLINE_ATTACK_FILE: ${{ inputs.offline-attack-file }}
        INPUT_PRIORITY: ${{ inputs.priority }}
        INPUT_KEV_ONLY: ${{ inputs.kev-only }}
        INPUT_MIN_CVSS: ${{ inputs.min-cvss }}
        INPUT_MIN_EPSS: ${{ inputs.min-epss }}
        INPUT_SORT_BY: ${{ inputs.sort-by }}
        INPUT_ROLLUP_BY: ${{ inputs.rollup-by }}
        INPUT_ROLLUP_TOP: ${{ inputs.rollup-top }}
        INPUT_MAX_CVES: ${{ inputs.max-cves }}
        INPUT_FAIL_ON_PROVIDER_ERROR: ${{ inputs.fail-on-provider-error }}
        INPUT_MAX_PROVIDER_AGE_HOURS: ${{ inputs.max-provider-age-hours }}
        INPUT_FAIL_ON_STALE_PROVIDER_DATA: ${{ inputs.fail-on-stale-provider-data }}
        INPUT_FAIL_ON_EXPIRED_WAIVERS: ${{ inputs.fail-on-expired-waivers }}
        INPUT_FAIL_ON_REVIEW_DUE_WAIVERS: ${{ inputs.fail-on-review-due-waivers }}
      run: |
        set -euo pipefail

        mode="$INPUT_MODE"
        html_report_path=""
        summary_path=""
        sarif_validation_path=""
        sarif_report_path=""
        summary_requested="false"
        requested_summary_path="$INPUT_SUMMARY_OUTPUT_PATH"
        summary_template="$INPUT_SUMMARY_TEMPLATE"
        cmd=(vuln-prioritizer)

        if [[ "$summary_template" != "detailed" && "$summary_template" != "compact" ]]; then
          echo "Unsupported summary-template: $summary_template" >&2
          exit 2
        fi

        count_nonempty_lines() {
          local raw="$1"
          local count=0
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              count=$((count + 1))
            fi
          done <<< "$raw"
          printf '%s' "$count"
        }

        append_multiline_args() {
          local flag="$1"
          local raw="$2"
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              cmd+=("$flag" "$value")
            fi
          done <<< "$raw"
        }

        resolve_single_input() {
          local raw="$1"
          local input_count=0
          local resolved=""
          while IFS= read -r value; do
            if [[ -n "$value" ]]; then
              input_count=$((input_count + 1))
              resolved="$value"
            fi
          done <<< "$raw"
          if [[ "$input_count" -ne 1 ]]; then
            echo "$mode mode expects exactly one input path." >&2
            exit 2
          fi
          printf '%s' "$resolved"
        }

        if [[ -n "$INPUT_CONFIG_FILE" ]]; then
          cmd+=(--config "$INPUT_CONFIG_FILE")
        fi
        if [[ "$INPUT_NO_CONFIG" == "true" ]]; then
          cmd+=(--no-config)
        fi

        if [[ "$mode" == "analyze" ]]; then
          if [[ "$(count_nonempty_lines "$INPUT_INPUT")" -eq 0 ]]; then
            echo "analyze mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            analyze
            --format "$INPUT_OUTPUT_FORMAT"
            --output "$INPUT_OUTPUT_PATH"
            --policy-profile "$INPUT_POLICY_PROFILE"
            --attack-source "$INPUT_ATTACK_SOURCE"
            --target-kind "$INPUT_TARGET_KIND"
          )
          if [[ "$INPUT_OUTPUT_FORMAT" == "sarif" ]]; then
            sarif_report_path="$INPUT_OUTPUT_PATH"
          fi
          append_multiline_args "--input" "$INPUT_INPUT"
          append_multiline_args "--input-format" "$INPUT_INPUT_FORMAT"

          if [[ -n "$requested_summary_path" || "$INPUT_GITHUB_STEP_SUMMARY" == "true" ]]; then
            summary_requested="true"
            if [[ -z "$requested_summary_path" ]]; then
              requested_summary_path="$RUNNER_TEMP/vuln-prioritizer-summary.md"
            fi
            cmd+=(--summary-output "$requested_summary_path")
            cmd+=(--summary-template "$summary_template")
          fi

          if [[ -n "$INPUT_ASSET_CONTEXT" ]]; then
            cmd+=(--asset-context "$INPUT_ASSET_CONTEXT")
          fi
          if [[ -n "$INPUT_HTML_OUTPUT_PATH" ]]; then
            cmd+=(--html-output "$INPUT_HTML_OUTPUT_PATH")
            html_report_path="$INPUT_HTML_OUTPUT_PATH"
          fi
          if [[ -n "$INPUT_TARGET_REF" ]]; then
            cmd+=(--target-ref "$INPUT_TARGET_REF")
          fi
          if [[ -n "$INPUT_POLICY_FILE" ]]; then
            cmd+=(--policy-file "$INPUT_POLICY_FILE")
          fi
          if [[ -n "$INPUT_WAIVER_FILE" ]]; then
            cmd+=(--waiver-file "$INPUT_WAIVER_FILE")
          fi
          if [[ -n "$INPUT_DEFENSIVE_CONTEXT_FILE" ]]; then
            cmd+=(--defensive-context-file "$INPUT_DEFENSIVE_CONTEXT_FILE")
          fi
          if [[ -n "$INPUT_FAIL_ON" ]]; then
            cmd+=(--fail-on "$INPUT_FAIL_ON")
          fi
          if [[ "$INPUT_SHOW_SUPPRESSED" == "true" ]]; then
            cmd+=(--show-suppressed)
          fi
          if [[ "$INPUT_HIDE_WAIVED" == "true" ]]; then
            cmd+=(--hide-waived)
          fi
          if [[ -n "$INPUT_PRIORITY" ]]; then
            cmd+=(--priority "$INPUT_PRIORITY")
          fi
          if [[ "$INPUT_KEV_ONLY" == "true" ]]; then
            cmd+=(--kev-only)
          fi
          if [[ -n "$INPUT_MIN_CVSS" ]]; then
            cmd+=(--min-cvss "$INPUT_MIN_CVSS")
          fi
          if [[ -n "$INPUT_MIN_EPSS" ]]; then
            cmd+=(--min-epss "$INPUT_MIN_EPSS")
          fi
          if [[ -n "$INPUT_SORT_BY" ]]; then
            cmd+=(--sort-by "$INPUT_SORT_BY")
          fi
          if [[ -n "$INPUT_MAX_CVES" ]]; then
            cmd+=(--max-cves "$INPUT_MAX_CVES")
          fi
          if [[ "$INPUT_FAIL_ON_PROVIDER_ERROR" == "true" ]]; then
            cmd+=(--fail-on-provider-error)
          fi
          if [[ -n "$INPUT_MAX_PROVIDER_AGE_HOURS" ]]; then
            cmd+=(--max-provider-age-hours "$INPUT_MAX_PROVIDER_AGE_HOURS")
          fi
          if [[ "$INPUT_FAIL_ON_STALE_PROVIDER_DATA" == "true" ]]; then
            cmd+=(--fail-on-stale-provider-data)
          fi
          if [[ "$INPUT_FAIL_ON_EXPIRED_WAIVERS" == "true" ]]; then
            cmd+=(--fail-on-expired-waivers)
          fi
          if [[ "$INPUT_FAIL_ON_REVIEW_DUE_WAIVERS" == "true" ]]; then
            cmd+=(--fail-on-review-due-waivers)
          fi
          if [[ -n "$INPUT_ATTACK_MAPPING_FILE" ]]; then
            cmd+=(--attack-mapping-file "$INPUT_ATTACK_MAPPING_FILE")
          fi
          if [[ -n "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE" ]]; then
            cmd+=(--attack-technique-metadata-file "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE")
          fi
          if [[ -n "$INPUT_PROVIDER_SNAPSHOT_FILE" ]]; then
            cmd+=(--provider-snapshot-file "$INPUT_PROVIDER_SNAPSHOT_FILE")
          fi
          if [[ "$INPUT_LOCKED_PROVIDER_DATA" == "true" ]]; then
            cmd+=(--locked-provider-data)
          fi
          if [[ "$INPUT_NO_CACHE" == "true" ]]; then
            cmd+=(--no-cache)
          fi
          if [[ -n "$INPUT_CACHE_DIR" ]]; then
            cmd+=(--cache-dir "$INPUT_CACHE_DIR")
          fi
          if [[ -n "$INPUT_CACHE_TTL_HOURS" ]]; then
            cmd+=(--cache-ttl-hours "$INPUT_CACHE_TTL_HOURS")
          fi
          if [[ -n "$INPUT_NVD_API_KEY_ENV" ]]; then
            cmd+=(--nvd-api-key-env "$INPUT_NVD_API_KEY_ENV")
          fi
          if [[ -n "$INPUT_OFFLINE_KEV_FILE" ]]; then
            cmd+=(--offline-kev-file "$INPUT_OFFLINE_KEV_FILE")
          fi
          if [[ -n "$INPUT_OFFLINE_ATTACK_FILE" ]]; then
            cmd+=(--offline-attack-file "$INPUT_OFFLINE_ATTACK_FILE")
          fi
          if [[ -n "$INPUT_VEX_FILES" ]]; then
            append_multiline_args "--vex-file" "$INPUT_VEX_FILES"
          fi
        elif [[ "$mode" == "compare" ]]; then
          if [[ "$(count_nonempty_lines "$INPUT_INPUT")" -eq 0 ]]; then
            echo "compare mode requires at least one input path." >&2
            exit 2
          fi
          cmd+=(
            compare
            --format "$INPUT_OUTPUT_FORMAT"
            --output "$INPUT_OUTPUT_PATH"
            --policy-profile "$INPUT_POLICY_PROFILE"
            --attack-source "$INPUT_ATTACK_SOURCE"
            --target-kind "$INPUT_TARGET_KIND"
          )
          append_multiline_args "--input" "$INPUT_INPUT"
          append_multiline_args "--input-format" "$INPUT_INPUT_FORMAT"
          if [[ -n "$INPUT_ASSET_CONTEXT" ]]; then
            cmd+=(--asset-context "$INPUT_ASSET_CONTEXT")
          fi
          if [[ -n "$INPUT_TARGET_REF" ]]; then
            cmd+=(--target-ref "$INPUT_TARGET_REF")
          fi
          if [[ -n "$INPUT_POLICY_FILE" ]]; then
            cmd+=(--policy-file "$INPUT_POLICY_FILE")
          fi
          if [[ -n "$INPUT_WAIVER_FILE" ]]; then
            cmd+=(--waiver-file "$INPUT_WAIVER_FILE")
          fi
          if [[ -n "$INPUT_DEFENSIVE_CONTEXT_FILE" ]]; then
            cmd+=(--defensive-context-file "$INPUT_DEFENSIVE_CONTEXT_FILE")
          fi
          if [[ "$INPUT_SHOW_SUPPRESSED" == "true" ]]; then
            cmd+=(--show-suppressed)
          fi
          if [[ "$INPUT_HIDE_WAIVED" == "true" ]]; then
            cmd+=(--hide-waived)
          fi
          if [[ -n "$INPUT_PRIORITY" ]]; then
            cmd+=(--priority "$INPUT_PRIORITY")
          fi
          if [[ "$INPUT_KEV_ONLY" == "true" ]]; then
            cmd+=(--kev-only)
          fi
          if [[ -n "$INPUT_MIN_CVSS" ]]; then
            cmd+=(--min-cvss "$INPUT_MIN_CVSS")
          fi
          if [[ -n "$INPUT_MIN_EPSS" ]]; then
            cmd+=(--min-epss "$INPUT_MIN_EPSS")
          fi
          if [[ -n "$INPUT_SORT_BY" ]]; then
            cmd+=(--sort-by "$INPUT_SORT_BY")
          fi
          if [[ -n "$INPUT_MAX_CVES" ]]; then
            cmd+=(--max-cves "$INPUT_MAX_CVES")
          fi
          if [[ "$INPUT_FAIL_ON_PROVIDER_ERROR" == "true" ]]; then
            cmd+=(--fail-on-provider-error)
          fi
          if [[ -n "$INPUT_MAX_PROVIDER_AGE_HOURS" ]]; then
            cmd+=(--max-provider-age-hours "$INPUT_MAX_PROVIDER_AGE_HOURS")
          fi
          if [[ "$INPUT_FAIL_ON_STALE_PROVIDER_DATA" == "true" ]]; then
            cmd+=(--fail-on-stale-provider-data)
          fi
          if [[ -n "$INPUT_ATTACK_MAPPING_FILE" ]]; then
            cmd+=(--attack-mapping-file "$INPUT_ATTACK_MAPPING_FILE")
          fi
          if [[ -n "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE" ]]; then
            cmd+=(--attack-technique-metadata-file "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE")
          fi
          if [[ -n "$INPUT_PROVIDER_SNAPSHOT_FILE" ]]; then
            cmd+=(--provider-snapshot-file "$INPUT_PROVIDER_SNAPSHOT_FILE")
          fi
          if [[ "$INPUT_LOCKED_PROVIDER_DATA" == "true" ]]; then
            cmd+=(--locked-provider-data)
          fi
          if [[ "$INPUT_NO_CACHE" == "true" ]]; then
            cmd+=(--no-cache)
          fi
          if [[ -n "$INPUT_CACHE_DIR" ]]; then
            cmd+=(--cache-dir "$INPUT_CACHE_DIR")
          fi
          if [[ -n "$INPUT_CACHE_TTL_HOURS" ]]; then
            cmd+=(--cache-ttl-hours "$INPUT_CACHE_TTL_HOURS")
          fi
          if [[ -n "$INPUT_NVD_API_KEY_ENV" ]]; then
            cmd+=(--nvd-api-key-env "$INPUT_NVD_API_KEY_ENV")
          fi
          if [[ -n "$INPUT_OFFLINE_KEV_FILE" ]]; then
            cmd+=(--offline-kev-file "$INPUT_OFFLINE_KEV_FILE")
          fi
          if [[ -n "$INPUT_OFFLINE_ATTACK_FILE" ]]; then
            cmd+=(--offline-attack-file "$INPUT_OFFLINE_ATTACK_FILE")
          fi
          if [[ -n "$INPUT_VEX_FILES" ]]; then
            append_multiline_args "--vex-file" "$INPUT_VEX_FILES"
          fi
        elif [[ "$mode" == "explain" ]]; then
          if [[ -z "$INPUT_CVE" ]]; then
            echo "explain mode requires the cve input." >&2
            exit 2
          fi
          explain_input="$(resolve_single_input "$INPUT_INPUT")"
          cmd+=(
            explain
            --cve "$INPUT_CVE"
            --analysis-json "$explain_input"
            --output "$INPUT_OUTPUT_PATH"
            --format "$INPUT_OUTPUT_FORMAT"
          )
        elif [[ "$mode" == "doctor" ]]; then
          doctor_format="$INPUT_OUTPUT_FORMAT"
          if [[ "$doctor_format" != "json" ]]; then
            doctor_format="json"
          fi
          cmd+=(
            doctor
            --output "$INPUT_OUTPUT_PATH"
            --format "$doctor_format"
          )
          if [[ -n "$INPUT_CACHE_DIR" ]]; then
            cmd+=(--cache-dir "$INPUT_CACHE_DIR")
          fi
          if [[ -n "$INPUT_CACHE_TTL_HOURS" ]]; then
            cmd+=(--cache-ttl-hours "$INPUT_CACHE_TTL_HOURS")
          fi
          if [[ -n "$INPUT_NVD_API_KEY_ENV" ]]; then
            cmd+=(--nvd-api-key-env "$INPUT_NVD_API_KEY_ENV")
          fi
          if [[ -n "$INPUT_OFFLINE_KEV_FILE" ]]; then
            cmd+=(--offline-kev-file "$INPUT_OFFLINE_KEV_FILE")
          fi
          if [[ -n "$INPUT_WAIVER_FILE" ]]; then
            cmd+=(--waiver-file "$INPUT_WAIVER_FILE")
          fi
          if [[ -n "$INPUT_ATTACK_MAPPING_FILE" ]]; then
            cmd+=(--attack-mapping-file "$INPUT_ATTACK_MAPPING_FILE")
          fi
          if [[ -n "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE" ]]; then
            cmd+=(--attack-technique-metadata-file "$INPUT_ATTACK_TECHNIQUE_METADATA_FILE")
          fi
        elif [[ "$mode" == "input-validate" ]]; then
          input_validate_format="$INPUT_OUTPUT_FORMAT"
          if [[ "$input_validate_format" != "json" ]]; then
            input_validate_format="json"
          fi
          cmd+=(
            input validate
            --output "$INPUT_OUTPUT_PATH"
            --format "$input_validate_format"
            --target-kind "$INPUT_TARGET_KIND"
          )
          append_multiline_args "--input" "$INPUT_INPUT"
          append_multiline_args "--input-format" "$INPUT_INPUT_FORMAT"
          if [[ -n "$INPUT_ASSET_CONTEXT" ]]; then
            cmd+=(--asset-context "$INPUT_ASSET_CONTEXT")
          fi
          if [[ -n "$INPUT_TARGET_REF" ]]; then
            cmd+=(--target-ref "$INPUT_TARGET_REF")
          fi
          if [[ -n "$INPUT_MAX_CVES" ]]; then
