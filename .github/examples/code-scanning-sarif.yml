name: Example Consumer Workflow - SARIF Upload

on:
  workflow_dispatch:
  pull_request:

jobs:
  prioritize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run vuln-prioritizer action
        id: prioritize
        uses: Noetheon/vuln-prioritizer-workbench@vX.Y.Z
        with:
          mode: analyze
          input: trivy-results.json
          input-format: trivy-json
          output-format: sarif
          output-path: results.sarif
          summary-template: compact
          github-step-summary: "true"
          asset-context: assets.csv
          vex-files: |
            openvex.json
          policy-profile: enterprise
          fail-on: high

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.prioritize.outputs.report-path }}
