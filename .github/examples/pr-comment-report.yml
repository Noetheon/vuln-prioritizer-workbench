name: Example Consumer Workflow - PR Comment

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  prioritize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run vuln-prioritizer action
        id: prioritize
        uses: Noetheon/vuln-prioritizer-workbench@vX.Y.Z
        with:
          mode: analyze
          input: trivy-results.json
          input-format: trivy-json
          output-format: json
          output-path: analysis.json
          summary-output-path: pr-comment.md
          summary-template: compact
          github-step-summary: "true"
          asset-context: assets.csv
          vex-files: |
            openvex.json
          policy-profile: enterprise

      - name: Publish PR comment from compact summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("${{ steps.prioritize.outputs.summary-path }}", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
