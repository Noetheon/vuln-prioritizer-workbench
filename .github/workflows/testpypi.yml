name: TestPyPI Publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package_version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml

      - name: Install project and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run release-equivalent local checks
        run: make release-check

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate built distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          artifact_root="$RUNNER_TEMP/workflow-artifacts/testpypi-built-wheel"
          mkdir -p "$artifact_root"
          python -m pip install --force-reinstall dist/*.whl
          vuln-prioritizer --help
          vuln-prioritizer doctor --format json --output "$artifact_root/doctor.json"
          VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p1_installed_cli_smoke.sh
          VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p2_installed_cli_smoke.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/*

      - name: Upload TestPyPI build debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testpypi-build-debug-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/workflow-artifacts/**
            docs/example*.json
            docs/examples/*.json

      - name: Resolve package version
        id: package_version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path
          payload = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"version={payload['project']['version']}")
          PY

  publish-testpypi:
    needs: build
    if: vars.TEST_PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi-install:
    needs: [build, publish-testpypi]
    if: vars.TEST_PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository fixtures
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml

      - name: Verify install from hosted TestPyPI
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.build.outputs.package_version }}"
          artifact_root="$RUNNER_TEMP/workflow-artifacts/verify-testpypi-install"
          mkdir -p "$artifact_root"
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if python -m pip install --force-reinstall \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "vuln-prioritizer==${version}"; then
              vuln-prioritizer --help
              vuln-prioritizer doctor --format json --output "$artifact_root/doctor.json"
              VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p1_installed_cli_smoke.sh
              VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p2_installed_cli_smoke.sh
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "TestPyPI install verification failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 20
          done

      - name: Upload TestPyPI verification debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: verify-testpypi-debug-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/workflow-artifacts/**
            docs/example*.json
            docs/examples/*.json
