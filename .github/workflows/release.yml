name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run release gate before publishing
        run: make release-check

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate built distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          vuln-prioritizer --help
          vuln-prioritizer doctor --format json --output doctor.json

      - name: Smoke test source-at-tag install path
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pipx
          python -m pipx run --spec "git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}" vuln-prioritizer --help
          python -m pipx run --spec "git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}" vuln-prioritizer doctor --format json --output doctor-tag.json

      - name: Resolve release notes path
        id: release_notes
        shell: bash
        run: |
          path="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$path" ]]; then
            echo "body_path=$path" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/*

      - name: Publish GitHub release from checked-in notes
        if: startsWith(github.ref, 'refs/tags/v') && steps.release_notes.outputs.body_path != ''
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: dist/*

      - name: Publish GitHub release with generated notes
        if: startsWith(github.ref, 'refs/tags/v') && steps.release_notes.outputs.body_path == ''
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi-install:
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify install from live PyPI
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if python -m pip install --force-reinstall "vuln-prioritizer==${version}"; then
              vuln-prioritizer --help
              vuln-prioritizer doctor --format json --output doctor.json
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "PyPI install verification failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 20
          done
