name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml

      - name: Install project and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run release gate before publishing
        run: make release-check

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate built distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          artifact_root="$RUNNER_TEMP/workflow-artifacts/release-built-wheel"
          mkdir -p "$artifact_root"
          python -m pip install --force-reinstall dist/*.whl
          vuln-prioritizer --help
          vuln-prioritizer doctor --format json --output "$artifact_root/doctor.json"
          VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p1_installed_cli_smoke.sh
          VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p2_installed_cli_smoke.sh

      - name: Smoke test source-at-tag install path
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          artifact_root="$RUNNER_TEMP/workflow-artifacts/release-source-tag"
          mkdir -p "$artifact_root"
          python -m pip install --upgrade pip pipx
          VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" \
          VULN_PRIORITIZER_PIPX_SPEC="git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_REF_NAME}" \
            bash scripts/p1_pipx_source_smoke.sh

      - name: Resolve release notes path
        id: release_notes
        shell: bash
        run: |
          path="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$path" ]]; then
            echo "body_path=$path" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/*

      - name: Upload release debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-debug-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/workflow-artifacts/**
            docs/example*.json
            docs/examples/*.json

      - name: Publish GitHub release from checked-in notes
        if: startsWith(github.ref, 'refs/tags/v') && steps.release_notes.outputs.body_path != ''
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: dist/*

      - name: Publish GitHub release with generated notes
        if: startsWith(github.ref, 'refs/tags/v') && steps.release_notes.outputs.body_path == ''
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi-install:
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v') && vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository fixtures
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            .pre-commit-config.yaml

      - name: Verify install from live PyPI
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          artifact_root="$RUNNER_TEMP/workflow-artifacts/verify-pypi-install"
          mkdir -p "$artifact_root"
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if python -m pip install --force-reinstall "vuln-prioritizer==${version}"; then
              vuln-prioritizer --help
              vuln-prioritizer doctor --format json --output "$artifact_root/doctor.json"
              VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p1_installed_cli_smoke.sh
              VULN_PRIORITIZER_SMOKE_OUTPUT_DIR="$artifact_root" bash scripts/p2_installed_cli_smoke.sh
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "PyPI install verification failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 20
          done

      - name: Upload PyPI verification debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: verify-pypi-debug-artifacts
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/workflow-artifacts/**
            docs/example*.json
            docs/examples/*.json
