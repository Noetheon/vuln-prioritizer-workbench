{% extends "base.html" %}
{% block title %}Import · {{ project.name }}{% endblock %}
{% block content %}
<section class="section narrow">
  <div class="section-head">
    <p class="eyebrow">Import</p>
    <h1>{{ project.name }}</h1>
  </div>
  <form class="form-panel" method="post" action="/web/projects/{{ project.id }}/imports" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      Input format
      <select name="input_format">
        <option value="cve-list">CVE list</option>
        <option value="generic-occurrence-csv">Generic occurrence CSV</option>
        <option value="trivy-json">Trivy JSON</option>
        <option value="grype-json">Grype JSON</option>
      </select>
    </label>
    <label>
      File
      <input required type="file" name="file">
    </label>
    <label>
      Provider snapshot
      <input name="provider_snapshot_file" placeholder="demo_provider_snapshot.json">
    </label>
    <label class="checkbox-row">
      <input type="checkbox" name="locked_provider_data" value="true">
      Locked provider data
    </label>
    <label>
      ATT&amp;CK source
      <select name="attack_source">
        <option value="none">None</option>
        <option value="ctid-json">CTID JSON</option>
      </select>
    </label>
    <label>
      ATT&amp;CK mapping file
      <input name="attack_mapping_file" placeholder="ctid_kev_enterprise_2025-07-28_attack-16.1_subset.json">
    </label>
    <label>
      ATT&amp;CK technique metadata
      <input name="attack_technique_metadata_file" placeholder="attack_techniques_enterprise_16.1_subset.json">
    </label>
    <label>
      Asset context
      <input type="file" name="asset_context_file" accept=".csv,text/csv">
    </label>
    <label>
      VEX document
      <input type="file" name="vex_file" accept=".json,application/json">
    </label>
    <label>
      Waiver file
      <input type="file" name="waiver_file" accept=".yml,.yaml,text/yaml,application/x-yaml">
    </label>
    <button class="button primary" type="submit">Start import</button>
  </form>
</section>
{% endblock %}
