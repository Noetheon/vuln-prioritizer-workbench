services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: vuln-prioritizer-workbench:local
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - workbench-data:/app/data
      - workbench-uploads:/app/uploads
      - workbench-reports:/app/reports
      - workbench-cache:/app/.cache/vuln-prioritizer
      - ./data:/app/examples:ro
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      NVD_API_KEY: ${NVD_API_KEY:-}
      VULN_PRIORITIZER_DB_URL: sqlite:////app/data/workbench.db
      VULN_PRIORITIZER_UPLOAD_DIR: /app/uploads
      VULN_PRIORITIZER_REPORT_DIR: /app/reports
      VULN_PRIORITIZER_PROVIDER_SNAPSHOT_DIR: /app/examples
      VULN_PRIORITIZER_CACHE_DIR: /app/.cache/vuln-prioritizer
      VULN_PRIORITIZER_MAX_UPLOAD_MB: ${VULN_PRIORITIZER_MAX_UPLOAD_MB:-25}
      VULN_PRIORITIZER_NVD_API_KEY_ENV: ${VULN_PRIORITIZER_NVD_API_KEY_ENV:-NVD_API_KEY}
      VULN_PRIORITIZER_CSRF_TOKEN: ${VULN_PRIORITIZER_CSRF_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  workbench-data:
  workbench-uploads:
  workbench-reports:
  workbench-cache:
