services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: vuln-prioritizer-workbench:local
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - workbench-data:/app/data
      - workbench-uploads:/app/uploads
      - workbench-reports:/app/reports
      - workbench-provider-snapshots:/app/provider-snapshots
      - workbench-cache:/app/.cache/vuln-prioritizer
      - ./data:/app/examples:ro
    command:
      [
        "sh",
        "-c",
        "cp -n /app/examples/*.json /app/provider-snapshots/ 2>/dev/null || true; exec vuln-prioritizer web serve --host 0.0.0.0 --port 8000",
      ]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      NVD_API_KEY: ${NVD_API_KEY:-}
      VULN_PRIORITIZER_DB_URL: sqlite:////app/data/workbench.db
      VULN_PRIORITIZER_UPLOAD_DIR: /app/uploads
      VULN_PRIORITIZER_REPORT_DIR: /app/reports
      VULN_PRIORITIZER_PROVIDER_SNAPSHOT_DIR: /app/provider-snapshots
      VULN_PRIORITIZER_ATTACK_ARTIFACT_DIR: /app/examples/attack
      VULN_PRIORITIZER_CACHE_DIR: /app/.cache/vuln-prioritizer
      VULN_PRIORITIZER_MAX_UPLOAD_MB: ${VULN_PRIORITIZER_MAX_UPLOAD_MB:-25}
      VULN_PRIORITIZER_NVD_API_KEY_ENV: ${VULN_PRIORITIZER_NVD_API_KEY_ENV:-NVD_API_KEY}
      VULN_PRIORITIZER_CSRF_TOKEN: ${VULN_PRIORITIZER_CSRF_TOKEN:-}
      VULN_PRIORITIZER_ALLOWED_HOSTS: ${VULN_PRIORITIZER_ALLOWED_HOSTS:-127.0.0.1,localhost}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    volumes:
      - workbench-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbench -d workbench"]
      interval: 10s
      timeout: 5s
      retries: 5

  workbench-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    image: vuln-prioritizer-workbench:local
    profiles:
      - postgres
    ports:
      - "127.0.0.1:8001:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - workbench-postgres-uploads:/app/uploads
      - workbench-postgres-reports:/app/reports
      - workbench-postgres-provider-snapshots:/app/provider-snapshots
      - workbench-postgres-cache:/app/.cache/vuln-prioritizer
      - ./data:/app/examples:ro
    command:
      [
        "sh",
        "-c",
        "cp -n /app/examples/*.json /app/provider-snapshots/ 2>/dev/null || true; exec vuln-prioritizer web serve --host 0.0.0.0 --port 8000",
      ]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      NVD_API_KEY: ${NVD_API_KEY:-}
      VULN_PRIORITIZER_DB_URL: postgresql+psycopg://workbench:workbench@postgres:5432/workbench
      VULN_PRIORITIZER_UPLOAD_DIR: /app/uploads
      VULN_PRIORITIZER_REPORT_DIR: /app/reports
      VULN_PRIORITIZER_PROVIDER_SNAPSHOT_DIR: /app/provider-snapshots
      VULN_PRIORITIZER_ATTACK_ARTIFACT_DIR: /app/examples/attack
      VULN_PRIORITIZER_CACHE_DIR: /app/.cache/vuln-prioritizer
      VULN_PRIORITIZER_MAX_UPLOAD_MB: ${VULN_PRIORITIZER_MAX_UPLOAD_MB:-25}
      VULN_PRIORITIZER_NVD_API_KEY_ENV: ${VULN_PRIORITIZER_NVD_API_KEY_ENV:-NVD_API_KEY}
      VULN_PRIORITIZER_CSRF_TOKEN: ${VULN_PRIORITIZER_CSRF_TOKEN:-}
      VULN_PRIORITIZER_ALLOWED_HOSTS: ${VULN_PRIORITIZER_ALLOWED_HOSTS:-127.0.0.1,localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  workbench-data:
  workbench-uploads:
  workbench-reports:
  workbench-provider-snapshots:
  workbench-cache:
  workbench-postgres-db:
  workbench-postgres-uploads:
  workbench-postgres-reports:
  workbench-postgres-provider-snapshots:
  workbench-postgres-cache:
